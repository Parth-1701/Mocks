<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamPortal | JEE, BITSAT, MHT-CET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900" x-data="app()">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" @click="page = 'home'">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white font-bold">EP</div>
                <span class="font-bold text-xl tracking-tight">ExamPortal</span>
            </div>
            <div class="flex items-center gap-4">
                <template x-if="!isLoggedIn">
                    <button @click="page = 'login'" class="text-blue-600 font-medium hover:text-blue-800">Login</button>
                </template>
                <template x-if="isLoggedIn">
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-medium text-gray-600" x-text="userEmail"></span>
                        <button @click="logout()" class="text-red-500 text-sm hover:underline">Logout</button>
                    </div>
                </template>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">

        <div x-show="page === 'home'" x-transition>
            <div class="text-center mb-12">
                <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Choose Your Target Exam</h1>
                <p class="text-gray-600">Prepare with high-quality mock tests and get instant results.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <template x-for="exam in exams">
                    <div @click="selectExam(exam)" class="group bg-white p-8 rounded-2xl shadow-sm border hover:border-blue-500 hover:shadow-xl transition-all cursor-pointer text-center">
                        <div :class="`w-16 h-16 ${exam.color} rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform` text-white">
                             <span class="text-2xl font-bold" x-text="exam.name[0]"></span>
                        </div>
                        <h3 class="text-xl font-bold mb-2" x-text="exam.name"></h3>
                        <p class="text-sm text-gray-500" x-text="exam.desc"></p>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'login'" class="max-w-md mx-auto" x-transition>
            <div class="bg-white p-8 rounded-2xl shadow-lg border">
                <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
                <form @submit.prevent="login()" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" x-model="loginForm.email" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Password</label>
                        <input type="password" x-model="loginForm.password" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Enter Portal</button>
                </form>
            </div>
        </div>

        <div x-show="page === 'exam-list'" x-transition>
            <div class="flex items-center gap-4 mb-8">
                <button @click="page = 'home'" class="p-2 hover:bg-gray-200 rounded-full transition">←</button>
                <h2 class="text-3xl font-bold" x-text="selectedExam?.name + ' Test Series'"></h2>
            </div>
            
            <div class="space-y-4">
                <template x-for="test in selectedExam?.tests">
                    <div class="bg-white p-6 rounded-xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <div>
                            <h4 class="font-bold text-lg" x-text="test.title"></h4>
                            <p class="text-sm text-gray-500" x-text="test.questions + ' Questions • ' + test.time + ' Mins'"></p>
                        </div>
                        <div class="flex gap-3 w-full md:w-auto">
                            <button @click="viewLeaderboard(test)" class="flex-1 md:flex-none px-4 py-2 border rounded-lg hover:bg-gray-50 font-medium">Leaderboard</button>
                            <button @click="startTest(test)" class="flex-1 md:flex-none px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Start Test</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'leaderboard'" x-transition>
            <div class="flex items-center gap-4 mb-8">
                <button @click="page = 'exam-list'" class="p-2 hover:bg-gray-200 rounded-full transition">←</button>
                <h2 class="text-3xl font-bold">Leaderboard</h2>
            </div>
            <div class="bg-white rounded-xl shadow border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4">Rank</th>
                            <th class="px-6 py-4">Student</th>
                            <th class="px-6 py-4">Score</th>
                            <th class="px-6 py-4">Accuracy</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(entry, index) in dummyLeaderboard">
                            <tr class="border-b hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-bold" x-text="'#' + (index + 1)"></td>
                                <td class="px-6 py-4 font-medium" x-text="entry.name"></td>
                                <td class="px-6 py-4 text-blue-600 font-bold" x-text="entry.score"></td>
                                <td class="px-6 py-4 text-gray-500" x-text="entry.accuracy + '%'"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        function app() {
            return {
                page: 'home',
                isLoggedIn: false,
                userEmail: '',
                loginForm: { email: '', password: '' },
                selectedExam: null,
                
                exams: [
                    { name: 'JEE Mains', color: 'bg-orange-500', desc: 'Focus on speed and accuracy.', tests: [
                        { title: 'Full Mock Test 1', questions: 90, time: 180 },
                        { title: 'Full Mock Test 2', questions: 90, time: 180 },
                        { title: 'Physics Sectional', questions: 30, time: 60 }
                    ]},
                    { name: 'JEE Advanced', color: 'bg-red-600', desc: 'Conceptually challenging problems.', tests: [
                        { title: 'Paper 1 - Full Length', questions: 54, time: 180 },
                        { title: 'Paper 2 - Full Length', questions: 54, time: 180 }
                    ]},
                    { name: 'MHT-CET', color: 'bg-green-500', desc: 'State-level entrance prep.', tests: [
                        { title: 'PCB Mock 1', questions: 150, time: 180 },
                        { title: 'PCM Mock 1', questions: 150, time: 180 }
                    ]},
                    { name: 'BITSAT', color: 'bg-blue-600', desc: 'Speed and logic based tests.', tests: [
                        { title: 'BITSAT Comprehensive 1', questions: 130, time: 180 },
                        { title: 'English & Logic Special', questions: 30, time: 45 }
                    ]}
                ],

                dummyLeaderboard: [
                    { name: 'Aryan Sharma', score: 285, accuracy: 95 },
                    { name: 'Priya Patel', score: 272, accuracy: 91 },
                    { name: 'Rahul V.', score: 260, accuracy: 88 },
                    { name: 'Sneha K.', score: 245, accuracy: 85 }
                ],

                selectExam(exam) {
                    this.selectedExam = exam;
                    this.page = 'exam-list';
                },

                login() {
                    this.isLoggedIn = true;
                    this.userEmail = this.loginForm.email;
                    this.page = 'home';
                },

                logout() {
                    this.isLoggedIn = false;
                    this.userEmail = '';
                    this.page = 'home';
                },

                viewLeaderboard(test) {
                    this.page = 'leaderboard';
                },

                startTest(test) {
                    if(!this.isLoggedIn) {
                        alert('Please login to start the test!');
                        this.page = 'login';
                        return;
                    }
                    alert('Starting ' + test.title + '. In a real app, this would redirect to the Quiz component!');
                }
            }
        }
        // Initialize Supabase
const supabaseUrl = 'https://saqbtjzxdrfpwrcpgdxu.supabase.co'
const supabaseKey = 'sb_publishable_AsjwUC2XUzvDk1p0HYhyxA_8-RpYaOP'
const supabase = supabase.createClient(supabaseUrl, supabaseKey)

function app() {
    return {
        page: 'home',
        isLoggedIn: false,
        userEmail: '',
        loginForm: { email: '', password: '' },
        // ... (keep your other variables like exams and dummyLeaderboard)

        // NEW: Check login status when the page loads
        async init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                this.isLoggedIn = true;
                this.userEmail = session.user.email;
            }
        },

        // UPDATED: Real Login Function
        async login() {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: this.loginForm.email,
                password: this.loginForm.password,
            });

            if (error) {
                alert("Login Error: " + error.message);
            } else {
                this.isLoggedIn = true;
                this.userEmail = data.user.email;
                this.page = 'home';
            }
        },

        // UPDATED: Real Logout Function
        async logout() {
            await supabase.auth.signOut();
            this.isLoggedIn = false;
            this.userEmail = '';
            this.page = 'home';
        },

        // NEW: Fetch Real Leaderboard from Supabase
        async fetchLeaderboard(testId) {
            const { data, error } = await supabase
                .from('submissions')
                .select('user_email, score, accuracy')
                .eq('test_id', testId)
                .order('score', { ascending: false })
                .limit(10);
            
            if (!error) this.dummyLeaderboard = data;
        }
    }
}
    </script>
</body>
</html>
